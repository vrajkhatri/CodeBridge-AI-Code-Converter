<!DOCTYPE html>
<html>
<head>
    <title>CodeBridge</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="light-mode">

<div class="container-fluid mt-4 mb-5">

    <nav class="navbar custom-navbar rounded p-3 mb-4">
        <span class="navbar-brand fw-bold">
            🚀 CodeBridge
        </span>

        <button id="themeBtn" type="button" class="btn btn-outline-primary" onclick="toggleTheme()">
            🌙 Dark Mode
        </button>
    </nav>

    <div class="card main-card shadow-lg p-4">

        <h2 class="text-center">
            CodeBridge
        </h2>

        <p class="text-center text-muted">
            Cross-Language Code Conversion System
        </p>

        <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

            <div class="row mb-3">

                <div class="col-md-6">
                    <label class="form-label">Source Language</label>

                    <select class="form-select" name="source" id="source">
                        <option {% if source=="Python" %}selected{% endif %}>Python</option>
                        <option {% if source=="PHP" %}selected{% endif %}>PHP</option>
                        <option {% if source=="Laravel" %}selected{% endif %}>Laravel</option>
                        <option {% if source=="Java" %}selected{% endif %}>Java</option>
                        <option {% if source=="JavaScript" %}selected{% endif %}>JavaScript</option>
                        <option {% if source=="C++" %}selected{% endif %}>C++</option>
                        <option {% if source=="HTML" %}selected{% endif %}>HTML</option>
                        <option {% if source=="CSS" %}selected{% endif %}>CSS</option>
                    </select>

                    <small id="detectedText" class="text-success"></small>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Target Language</label>

                    <select class="form-select" name="target" id="target">
                        <option {% if target=="PHP" %}selected{% endif %}>PHP</option>
                        <option {% if target=="Laravel" %}selected{% endif %}>Laravel</option>
                        <option {% if target=="Python" %}selected{% endif %}>Python</option>
                        <option {% if target=="Java" %}selected{% endif %}>Java</option>
                        <option {% if target=="JavaScript" %}selected{% endif %}>JavaScript</option>
                        <option {% if target=="C++" %}selected{% endif %}>C++</option>
                        <option {% if target=="HTML" %}selected{% endif %}>HTML</option>
                        <option {% if target=="CSS" %}selected{% endif %}>CSS</option>
                    </select>
                </div>

            </div>

            <div class="drop-zone" id="dropZone">
                <p>📁 Drag & Drop Code File Here</p>
                <p class="small">or click to upload</p>

                <input type="file"
                       name="codefile"
                       id="fileInput"
                       hidden
                       accept=".py,.php,.java,.js,.cpp,.html,.css,.txt">

                <p id="fileName" class="text-info"></p>
            </div>

            <div class="row mt-4">

                <div class="col-md-6">
                    <h5>Source Code</h5>

                    <textarea class="form-control code-box"
                              name="code"
                              id="codeInput"
                              rows="18"
                              placeholder="Paste your code here..."
                              onkeyup="detectLanguage()">{{ input_code }}</textarea>
                </div>

                <div class="col-md-6">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5>Converted Code</h5>

                        {% if converted_code %}
                        <div>
                            <button type="button" class="btn btn-success btn-sm" onclick="copyCode()">
                                📋 Copy
                            </button>

                            <button type="button" class="btn btn-warning btn-sm" onclick="downloadCode()">
                                ⬇ Download
                            </button>
                        </div>
                        {% endif %}
                    </div>

                    {% if info %}
                    <p class="text-info small">{{ info }}</p>
                    {% endif %}

                    <pre class="output-box"><code id="result">{{ converted_code }}</code></pre>
                </div>

            </div>

            <button class="btn btn-primary w-100 mt-4">
                Convert Code
            </button>

        </form>

        <div id="loader" class="text-center mt-4" style="display:none;">
            <div class="spinner-border text-primary"></div>
            <p class="mt-2">
                Converting code, please wait...
            </p>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
